# ──────────────────────────────────────────────────────────────────────────
#  SimpleBoxer — virtual sparring players
#
#  Boxers are REAL players to the server: real player list entries, real
#  inventories, real movement packets, real knockback. Everything below
#  tunes the brain driving them. Every key inherits sensible defaults when
#  omitted; malformed values warn in the console and keep the inherited
#  value — a typo can never break a spawn.
#
#  You rarely need to edit this by hand: run /boxer in game and the menu
#  edits these defaults and presets for you (saved straight back here).
#  Hand-editing still works — run /boxer reload (or use the menu) afterwards.
#  (On servers older than 1.18.1, the first menu-driven save rewrites this
#  file without these comments — your settings are kept, the notes are not.)
# ──────────────────────────────────────────────────────────────────────────

# Keep boxers out of the tab list (they stay tab-completable in commands —
# completion is server-side). On 1.19.2 and older this uses the classic
# info-remove technique: players who join AFTER a boxer spawned see its
# default skin, the known tradeoff of that era's protocol.
hide-from-tab: true

# Applied to every spawn that names no preset, and the base every preset
# overlays. The shipped values describe an unhandicapped sparring partner:
# no artificial ping, crisp-but-human aim, spam-click cadence, straight
# rush, no w-tap.
defaults:
  # Simulated round-trip time, milliseconds (0–2000). Half delays what the
  # boxer perceives (the world, its own knockback packets), half delays its
  # actions (movement, clicks) — the symmetric split of a real connection.
  ping-ms: 0
  # Clicks per second (0–50; 0 = never attacks). At 20 TPS, 20+ CPS
  # saturates at one click per tick like any real client.
  cps: 8.0
  # Per-click interval wobble, 0–0.9 (fraction of the interval). The
  # long-run rate stays at cps.
  click-jitter: 0.3
  # The aim spring: how the crosshair chases the target.
  aim:
    # locked (aimbot snap) / sharp (crisp PvP) / smooth (comfortable
    # tracking) / sloppy (clearly human-limited).
    preset: sharp
    # Granular overrides on top of the preset, all optional:
    # stiffness: 0.55      # error fraction converted to velocity per tick (0-1)
    # damping: 0.30        # velocity surviving each tick (0-0.999; higher = springier = overshoots)
    # max-velocity: 60.0   # degrees per tick cap
  # Attack range in blocks (0.5–6). 3.0 is the vanilla survival default;
  # the server still applies its own validation on top.
  reach: 3.0
  # A click only becomes an attack when the crosshair is within this many
  # degrees of the target bearing — out-of-cone clicks swing at air.
  aim-tolerance-degrees: 10.0
  # W-tap: release forward (dropping sprint) after a landed hit, then
  # re-press — re-arming sprint knockback exactly like a human w-tapper.
  w-tap:
    enabled: false
    # Ticks after the landed hit before the release begins (0–20).
    delay-ticks: 1
    # Ticks the forward key stays released (1–20).
    release-ticks: 2
  movement:
    # rush (straight at the target) / strafe-circle (orbit in the pocket) /
    # strafe-weave (left-right on approach) / stand (feet planted).
    style: rush
    # Blocks from the target at which the forward key releases. 0 — the
    # default — NEVER releases: the boxer holds W through its target and
    # entity pushing resolves the body contact, exactly like a real
    # W-holding rusher. Easing off in the pocket drops sprint (vanilla
    # needs forward impulse >= 0.8) and kills the momentum that survives
    # combos. Raise it (e.g. 2.5) for deliberate range-discipline trades —
    # knowing what that means: every ring re-entry re-presses W and
    # re-arms sprint, so a ringed boxer lands sprint-fresh (w-tap-grade)
    # knockback on every return punch EVEN WITH w-tap disabled, while its
    # in-ring punches land plain. Range discipline IS w-tapping; for
    # symmetric hold-W trade sparring keep this 0.
    stop-distance: 0.0
    # Hold sprint whenever the forward key is down. Boxers also obey the
    # server's live movement-speed attribute, so Speed/Slowness potions
    # and plugin modifiers change their pace like any real player's.
    sprint: true
  # Whether the boxer can be hurt at all. FALSE (the default) makes a boxer a
  # mortal sparring partner — it takes damage, can die, and (see `death` below)
  # drops its kit and stays down until you respawn it. Set TRUE for an immortal
  # fixture (the built-in `dummy` preset does this for a punching bag).
  invincible: false
  # HOW an invincible boxer survives, when `invincible` is true:
  #   zero-damage    — the fixed, proper invincibility: the hit registers fully
  #                    (knockback, i-frames, hurt animation) but the damage is
  #                    zeroed, so no burst can ever kill. The default.
  #   legacy-restore — take the hit, restore health next tick (a one-shot beyond
  #                    max HP still dies). Only for tests asserting exact damage
  #                    numbers through the MONITOR priority.
  invincible-mode: zero-damage
  # What happens when a mortal boxer's health reaches zero.
  death:
    # Drop the boxer's items into the world on death (like a real player).
    drop-items: true
    # manual       — die and stay down until respawned (/boxer respawn or the GUI).
    # auto-respawn — pop back up in place immediately (the classic fixture behavior).
    mode: manual
  # Pin hunger full: sprint stays legal, no exhaustion noise. Set `hunger.natural`
  # below to let the boxer actually get hungry and eat.
  feed-hunger: true
  # Hunger behavior (only when feed-hunger is false / natural is true).
  hunger:
    # Let vanilla exhaustion run so the boxer gets hungry and eats.
    natural: false
    # Food level (0-20) at which the boxer stops fighting to eat.
    eat-threshold: 14
  # Opt-in combat techniques (all off by default — the default boxer just rushes).
  combat:
    # Block between hits with a sword to re-arm the sprint bonus (needs Mental).
    block-hit: false
    # Swap to a fishing rod to knock an approaching target back before comboing.
    rod-knockback: false
    rod-min: 3.0
    rod-max: 6.0
    # Circle-strafe side selection (STRAFE_CIRCLE style only):
    #   none      - a plain non-adaptive circle
    #   orbit     - break a tight aim (strafe to the side their crosshair lags)
    #   juke      - also juke opposite the opponent's motion to open the angle
    #   wtap-sync - time jukes to the sprint re-press
    strafe-preset: none
    # Straight-line s-tap combos (sprint reset, no A/D strafe).
    s-tap: false
    # Fraction of clicks intentionally aimed off-target (0-1).
    miss-chance: 0.0
    # Ceiling crit-spam: under a roof low enough to clip the jump arc, hop,
    # drop sprint on the descent, and hold attacks to the fall so landed hits
    # crit. Pays off most on OCM-style pinned attack meters.
    crit-spam: false
  # Splash-potion self-heal (mortal boxers only).
  self-heal:
    enabled: false
    # Health (0-20) that triggers a heal routine.
    trigger-health: 6.0
    # Health (0-20) to recover to before re-engaging.
    resume-health: 18.0
    # Most instant-health splashes to spend per heal.
    splash-cap: 6
  # Inventory behavior.
  items:
    # Vacuum nearby dropped items into the boxer's real inventory.
    auto-pickup: false
    # Re-stamp the fixed kit every tick (a pure fixture whose gear never changes).
    lock-loadout: false
    # Stamp every kit piece Unbreakable. Off (the default) lets gear wear like a
    # real player's — armor chips on hit, weapons dull on attack, and a broken
    # piece empties its slot. A locked kit (lock-loadout) is always unbreakable.
    unbreakable-kit: false
    # Which hotbar slot (0-8) holds each tool the brain reaches for.
    weapon-slot: 0
    rod-slot: 1
    pot-slot: 2
    food-slot: 3
    block-slot: 4
    # Seed the hotbar with a FINITE supply of instant-health splash potions the
    # boxer throws to heal (needs self-heal enabled). The supply depletes as it
    # throws and can genuinely run out. splash-pot-count is how many (0-36;
    # counts past the hotbar overflow into the main inventory).
    fill-splash-pots: false
    splash-pot-count: 0

# Named presets selectable at spawn (/boxer spawn <name> <preset>) and via
# /boxer set <name> preset <preset>. Each is a sparse overlay over
# `defaults`. The built-in ladder is always available — dummy, easy,
# medium, hard, expert, aimbot — and an entry here with the same name
# OVERRIDES the built-in.
presets:
  # laggy-spammer:
  #   ping-ms: 180
  #   cps: 14
  #   aim:
  #     preset: smooth
